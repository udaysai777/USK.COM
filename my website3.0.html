    background: linear-gradient(to right, #f5f7fa, #c3cfe2);
    text-align: center;

/* Navigation Bar */
nav{
    background-color: #333;
    padding: 15px;
}

nav a{
    color: white;
    text-decoration: none;

    font-weight: bold;
}

nav a:hover{

}

h1{
    margin-top: 20px;
}

/* Gallery Layout */
.gallery{
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

.gallery img{
    width: 250px;
    margin: 15px;
    border-radius: 10px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.gallery img:hover{
    transform: scale(1.05);

footer{
    margin-top: 30px;
    padding: 15px;
    background-color: #333;
    color: white;
}
