<!DOCTYPE html>
<html>
<head>
<title>USK.COM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color:white;
    text-align:center;
}

/* Navigation Bar */
nav{
    background: rgba(0,0,0,0.4);
    padding:15px;
}
nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}
nav a:hover{
    color:yellow;
}

/* Heading Animation */
h1{
    margin-top:30px;
    animation: fadeIn 2s ease-in-out;
}

/* Gallery */
.gallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:30px;
}
.gallery img{
    width:250px;
    margin:15px;
    border-radius:15px;
    transition: transform 0.4s;
}
.gallery img:hover{
    transform: scale(1.1);
}

/* Footer */
footer{
    margin-top:40px;
    padding:20px;
    background: rgba(0,0,0,0.4);
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">Gallery</a>
    <a href="#">About</a>
</nav>

<h1>AMMA ❤️ NANNA</h1>

<div class="gallery">
    <img src="AMMAJPG.jpeg">
    <img src="NANNAJPG.jpeg">
</div>

<p>THEY ARE THE BEST COUPLE I HAVE EVER SEEN</p>

<footer>
    © 2026 USK.COM | Built by Udaysai 🔥
</footer>

</body>
</html>
